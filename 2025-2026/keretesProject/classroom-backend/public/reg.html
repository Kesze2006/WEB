<!doctype html>
<html lang="hu">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous"
        />
        <title>Az oldal neve</title>
    </head>
    <body>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Név" required />
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Jelszó" required />
            <select id="role" required>
                <option value="">Válassz szerepet</option>
                <option value="diak">Diák</option>
                <option value="tanar">Tanár</option>
            </select>
            <button>Regisztráció</button>
        </form>

        <script>
            document.getElementById("registerForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const res = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: name.value,
                        email: email.value,
                        password: password.value,
                        role: role.value,
                    }),
                });

                const data = await res.json();

                if (data.token) {
                    localStorage.setItem("token", data.token);
                    alert("Sikeres regisztráció!");
                    console.log("User:", data.user);
                    console.log("Token:", data.token);
                } else {
                    alert("Hiba történt!");
                    console.log(data);
                }
            });
        </script>
    </body>
</html>
